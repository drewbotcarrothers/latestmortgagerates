name: Daily Rate Tweet

on:
  schedule:
    # Run daily at 9 AM Eastern Time
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log only, don't post)"
        required: false
        default: 'false'
        type: boolean

jobs:
  tweet:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: ./web
        run: |
          npm ci --include=dev || npm install
          npm install twitter-api-v2 dotenv tsx --save
      
      - name: Verify data exists
        working-directory: ./web
        run: |
          ls -la data/rates.json data/metadata.json
      
      - name: Run daily tweet
        working-directory: ./web
        run: npx tsx scripts/daily-tweet.ts
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
