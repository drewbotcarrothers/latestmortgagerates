# Mortgage Rate Lender Configuration
# Defines which lenders to scrape, their URLs, and scraping methods

lenders:
  # Big 5 Banks
  rbc:
    name: "Royal Bank of Canada"
    slug: "rbc"
    type: "bank"
    rate_url: "https://www.rbcroyalbank.com/mortgages/mortgage-rates.html"
    scrape_method: "browser"  # Requires JavaScript
    frequency: "6h"
    priority: 1
    
  td:
    name: "TD Bank"
    slug: "td"
    type: "bank"
    rate_url: "https://td.com/ca/en/personal-banking/products/mortgages/mortgage-rates"
    scrape_method: "browser"
    frequency: "6h"
    priority: 1
    
  bmo:
    name: "Bank of Montreal"
    slug: "bmo"
    type: "bank"
    rate_url: "https://www.bmo.com/main/personal/mortgages/mortgage-rates/"
    scrape_method: "browser"
    frequency: "6h"
    priority: 1
    
  scotiabank:
    name: "Scotiabank"
    slug: "scotiabank"
    type: "bank"
    rate_url: "https://www.scotiabank.com/ca/en/personal/rates-prices/mortgages-rates.html"
    scrape_method: "browser"
    frequency: "6h"
    priority: 1
    
  cibc:
    name: "CIBC"
    slug: "cibc"
    type: "bank"
    rate_url: "https://www.cibc.com/en/personal-banking/mortgages/mortgage-rates.html"
    scrape_method: "browser"
    frequency: "6h"
    priority: 1
    
  # Monolines & Digital Lenders
  nesto:
    name: "nesto"
    slug: "nesto"
    type: "digital"
    rate_url: "https://www.nesto.ca/mortgage-rates/"
    scrape_method: "web_fetch"
    frequency: "12h"
    priority: 2
    
  tangerine:
    name: "Tangerine"
    slug: "tangerine"
    type: "digital"
    rate_url: "https://www.tangerine.ca/en/products/borrowing/mortgages"
    scrape_method: "browser"
    frequency: "12h"
    priority: 2

# Aggregators (multiple lenders in one scrape)
ratehub:
    name: "Ratehub"
    slug: "ratehub"
    type: "aggregator"
    rate_url: "https://www.ratehub.ca/best-mortgage-rates"
    scrape_method: "http"
    frequency: "6h"
    priority: 1
    notes: "Aggregates rates from Big 5 + monolines"

# Bank of Canada API (no browser needed)
benchmarks:
  boc_valet:
    name: "Bank of Canada Valet API"
    type: "api"
    base_url: "https://www.bankofcanada.ca/valet"
    endpoints:
      posted_rates: "/observations/group/POSTED_CHARTERED_BANKS/json?recent=4"
      broker_average: "/observations/BROKER_AVERAGE_5YR_VRM/json?recent=10"
    frequency: "24h"
    priority: 0
