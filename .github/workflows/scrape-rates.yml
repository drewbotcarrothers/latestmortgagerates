name: Scrape Mortgage Rates
# Scrapes rates from 19 Canadian lenders daily

on:
  schedule:
    # Run daily at 6:00 AM UTC (1:00 AM EST / 2:00 AM EDT)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        working-directory: ./scraping
        run: |
          pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: |
          pip install playwright
          python -m playwright install chromium
      
      - name: Run rate scrapers
        working-directory: ./scraping
        run: |
          python test_all_lenders.py
      
      - name: Export rates to JSON
        working-directory: ./scraping
        run: |
          python export_rates.py
      
      - name: Copy JSON files to data folder
        run: |
          mkdir -p ./data
          cp ./rates.json ./data/rates.json
          cp ./metadata.json ./data/metadata.json
          ls -la ./data/
      
      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet rates.json || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push if rates changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add rates.json metadata.json data/rates.json data/metadata.json
          git commit -m "Update rates: $(date +'%Y-%m-%d')"
          git push
