name: Scrape Mortgage Rates

permissions:
  contents: write

on:
  schedule:
    - cron: '0 9,14 * * *'  # 9 AM and 2 PM UTC daily
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python dependencies
        working-directory: ./scraping
        run: pip install -r requirements.txt
        
      - name: Install Playwright browsers
        working-directory: ./scraping
        run: |
          pip install playwright
          python -m playwright install chromium
          
      - name: Run rate scrapers
        working-directory: ./scraping
        run: python test_all_lenders.py
        
      - name: Export rates to JSON
        working-directory: ./scraping
        run: python export_rates.py
        
      - name: Check for changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit and push if rates changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add rates.json metadata.json
          git commit -m "Update rates: $(date +%Y-%m-%d)"
          git push
