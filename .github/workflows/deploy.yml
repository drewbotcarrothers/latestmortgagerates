name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Next.js app
        run: npm run build
      
      - name: Verify build output
        run: |
          echo "Contents of dist folder:"
          ls -la dist/
          echo "Size of dist/_next folder:"
          du -sh dist/_next 2>/dev/null || echo "_next folder missing or empty"

      - name: Deploy to Hostinger via SFTP
        env:
          SFTP_USER: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          
          # Create batch file for SFTP commands
          cat > sftp_batch.txt << 'EOF'
          lcd dist
          cd /public_html
          put -r .
          bye
          EOF
          
          # Execute SFTP with batch file
          sshpass -p "$SFTP_PASS" sftp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -P 65002 -b sftp_batch.txt $SFTP_USER@$SFTP_HOST
