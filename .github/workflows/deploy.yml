name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Next.js app
        run: npm run build
      
      - name: Verify build output
        run: |
          echo "Contents of dist folder:"
          ls -la dist/
          echo "Size of dist/_next folder:"
          du -sh dist/_next 2>/dev/null || echo "_next folder missing or empty"

      - name: Deploy to Hostinger via FTP
        env:
          FTP_USER: ${{ secrets.SFTP_USERNAME }}
          FTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          FTP_HOST: ${{ secrets.SFTP_HOST }}
        run: |
          sudo apt-get update && sudo apt-get install -y ncftp
          
          # Upload to public_html using ncftpput (relative path)
          cd dist
          ncftpput -R -v -u "$FTP_USER" -p "$FTP_PASS" "$FTP_HOST" . .
