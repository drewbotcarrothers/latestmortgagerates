name: Send Rate Alert Emails

on:
  schedule:
    # Daily at 9:00 AM EST
    - cron: '0 14 * * *'
    # Weekly on Sundays at 9:00 AM EST  
    - cron: '0 14 * * 0'
    # Monthly on 1st at 9:00 AM EST
    - cron: '0 14 1 * *'
  workflow_dispatch:
    inputs:
      frequency:
        description: 'Email frequency to send'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - monthly

jobs:
  send-emails:
    runs-on: ubuntu-latest
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          
      - name: Download subscribers from Hostinger
        run: |
          # Use SCP or SFTP to download the subscribers.json file from Hostinger
          # This requires SSH credentials stored in secrets
          mkdir -p data
          echo "Downloading subscriber list..."
          # Placeholder for SCP/SFTP command
          # scp -P ${{ secrets.SSH_PORT }} -i ~/.ssh/key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/path/to/subscribers.json data/
          echo "Note: Configure SCP download in production"
          
      - name: Send rate alerts
        run: |
          # Determine frequency
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            FREQUENCY="${{ github.event.inputs.frequency }}"
          elif [ "${{ github.event.schedule }}" == "0 14 * * *" ]; then
            FREQUENCY="daily"
          elif [ "${{ github.event.schedule }}" == "0 14 * * 0" ]; then
            FREQUENCY="weekly"
          else
            FREQUENCY="monthly"
          fi
          
          echo "Sending $FREQUENCY alerts..."
          
          # Run PHP script to send emails
          php scripts/send-alerts.php "$FREQUENCY"
          
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: email-logs
          path: data/send-logs.txt
          retention-days: 30
