name: Generate & Upload YouTube Videos

on:
  # Tier 1: Daily Shorts — every day at 8:30 AM EST
  schedule:
    - cron: '30 12 * * *'     # 8:30 AM EDT daily / 12:30 UTC

  # Tier 2: Weekly Cards — every Monday at 7:30 AM EST
    - cron: '30 11 * * 1'     # 7:30 AM EDT Monday

  # Tier 3: Monthly Deep Dive — first Sunday of each month at 10 AM EST
    - cron: '0 14 1-7 * 0'   # First Sunday, 10 AM EDT

  # Manual trigger with options
  workflow_dispatch:
    inputs:
      video_type:
        description: 'Video type to generate'
        required: true
        default: 'cards'
        type: choice
        options:
          - short      # 15s vertical Short (daily)
          - cards      # 25s landscape cards (weekly) ← NEW default
          - weekly     # 25s legacy weekly summary
          - long       # 75s deep analysis (legacy)
          - monthly    # 90s monthly deep dive
      skip_upload:
        description: 'Skip YouTube upload (dry run)'
        required: false
        default: false
        type: boolean

jobs:
  # Determine video type from schedule or manual input
  determine-type:
    runs-on: ubuntu-latest
    outputs:
      video_type: ${{ steps.determine.outputs.video_type }}
      upload_type: ${{ steps.determine.outputs.upload_type }}
    steps:
      - name: Determine video type from schedule
        id: determine
        run: |
          # Default from workflow_dispatch input
          VIDEO_TYPE="${{ github.event.inputs.video_type || 'cards' }}"
          
          # If triggered by schedule, determine from cron
          if [ "${{ github.event_name }}" == "schedule" ]; then
            # Get current day and date
            DAY_OF_WEEK=$(date +%u)  # 1=Monday, 7=Sunday
            DAY_OF_MONTH=$(date +%d)
            
            # Check if first Sunday of month (monthly deep dive)
            if [ "$DAY_OF_WEEK" == "7" ] && [ "$DAY_OF_MONTH" -le "7" ]; then
              VIDEO_TYPE="monthly"
            # Monday = weekly cards
            elif [ "$DAY_OF_WEEK" == "1" ]; then
              VIDEO_TYPE="cards"
            # Any other day = daily short
            else
              VIDEO_TYPE="short"
            fi
          fi
          
          echo "video_type=${VIDEO_TYPE}" >> $GITHUB_OUTPUT
          echo "upload_type=${VIDEO_TYPE}" >> $GITHUB_OUTPUT
          echo "📅 Video type: ${VIDEO_TYPE}"
          echo "📅 Day: $(date +%A), Date: $(date +%Y-%m-%d)"

  # Job 1: Generate HTML composition from rate data
  generate:
    runs-on: ubuntu-latest
    needs: determine-type
    outputs:
      output_dir: ${{ steps.generate.outputs.output_dir }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd video-pipeline
          npm install

      - name: Generate video composition
        id: generate
        run: |
          cd video-pipeline
          VIDEO_TYPE="${{ needs.determine-type.outputs.video_type }}"
          echo "Generating ${VIDEO_TYPE} video..."
          
          case "$VIDEO_TYPE" in
            short)
              node scripts/generate-daily-rate-short.js
              ;;
            cards)
              node scripts/generate-weekly-5yr-cards.js
              ;;
            weekly)
              node scripts/generate-weekly-summary.js
              ;;
            long)
              node scripts/generate-weekly-update.js
              ;;
            monthly)
              node scripts/generate-monthly-deepdive.js
              ;;
            *)
              echo "Unknown video type: $VIDEO_TYPE"
              exit 1
              ;;
          esac
          
          # Get the latest output directory
          LATEST_DIR=$(ls -td output/*/ | head -1)
          echo "output_dir=${LATEST_DIR}" >> $GITHUB_OUTPUT
          echo "Generated: ${LATEST_DIR}"

      - name: Upload composition artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-composition
          path: video-pipeline/output/*/

  # Job 2: Render HTML to MP4 using HyperFrames
  render:
    runs-on: ubuntu-latest
    needs: [determine-type, generate]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install HyperFrames CLI
        run: npm install -g hyperframes

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download composition
        uses: actions/download-artifact@v4
        with:
          name: video-composition
          path: video-pipeline/output/

      - name: Find composition directory
        id: find
        run: |
          cd video-pipeline/output
          COMP_DIR=$(ls -d */ | head -1)
          echo "comp_dir=${COMP_DIR}" >> $GITHUB_OUTPUT

      - name: Render to MP4
        run: |
          cd "video-pipeline/output/${{ steps.find.outputs.comp_dir }}"
          npx hyperframes render --quality high --output video.mp4

      - name: Rename video by type
        run: |
          cd video-pipeline/output/${{ steps.find.outputs.comp_dir }}
          VIDEO_TYPE="${{ needs.determine-type.outputs.video_type }}"
          mv video.mp4 "${VIDEO_TYPE}.mp4"

      - name: Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: video-pipeline/output/*/*.mp4

  # Job 3: Upload to YouTube
  upload:
    runs-on: ubuntu-latest
    needs: [determine-type, render]
    if: ${{ github.event.inputs.skip_upload != 'true' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd video-pipeline
          npm install

      - name: Download rendered video
        uses: actions/download-artifact@v4
        with:
          name: rendered-video
          path: video-pipeline/output/

      - name: Find video file
        id: find
        run: |
          cd video-pipeline/output
          VIDEO=$(find . -name "*.mp4" | head -1)
          echo "video_path=${VIDEO}" >> $GITHUB_OUTPUT
          echo "Found video: ${VIDEO}"

      - name: Upload to YouTube
        env:
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          mkdir -p video-pipeline/config
          
          if [ -z "$YOUTUBE_CLIENT_SECRET" ]; then
            echo "❌ YOUTUBE_CLIENT_SECRET not set"
            exit 1
          fi
          if [ -z "$YOUTUBE_REFRESH_TOKEN" ]; then
            echo "❌ YOUTUBE_REFRESH_TOKEN not set"
            exit 1
          fi
          
          printf '%s\n' "$YOUTUBE_CLIENT_SECRET" > video-pipeline/config/client_secret.json
          printf '{"refresh_token":"%s"}\n' "$YOUTUBE_REFRESH_TOKEN" > video-pipeline/config/tokens.json
          
          cd video-pipeline
          VIDEO=$(find output -name "*.mp4" | head -1)
          VIDEO_TYPE="${{ needs.determine-type.outputs.upload_type }}"
          echo "Uploading as type: ${VIDEO_TYPE}"
          node scripts/upload-youtube.js --video "$VIDEO" --type "$VIDEO_TYPE" --draft

      - name: Clean up secrets
        if: always()
        run: |
          rm -rf video-pipeline/config/
