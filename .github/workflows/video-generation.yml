name: Generate & Upload YouTube Videos

on:
  # Weekly on Mondays at 7:30 AM EST (weekly summary)
  schedule:
    - cron: '30 11 * * 1'   # 7:30 AM EDT Monday / 11:30 UTC

  # Manual trigger with options
  workflow_dispatch:
    inputs:
      video_type:
        description: 'Video type to generate'
        required: true
        default: 'weekly'
        type: choice
        options:
          - weekly
          - short
          - long
      skip_upload:
        description: 'Skip YouTube upload (dry run)'
        required: false
        default: false
        type: boolean

jobs:
  # Job 1: Generate HTML composition from rate data
  generate:
    runs-on: ubuntu-latest
    outputs:
      output_dir: ${{ steps.generate.outputs.output_dir }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd video-pipeline
          npm install

      - name: Generate video composition
        id: generate
        run: |
          cd video-pipeline
          VIDEO_TYPE="${{ github.event.inputs.video_type || 'weekly' }}"
          if [ "$VIDEO_TYPE" == "long" ]; then
            node scripts/generate-weekly-update.js
          elif [ "$VIDEO_TYPE" == "short" ]; then
            node scripts/generate-daily-rate-short.js
          else
            node scripts/generate-weekly-summary.js
          fi
          # Get the latest output directory
          LATEST_DIR=$(ls -td output/*/ | head -1)
          echo "output_dir=${LATEST_DIR}" >> $GITHUB_OUTPUT
          echo "Generated: ${LATEST_DIR}"

      - name: Upload composition artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-composition
          path: video-pipeline/output/*/

  # Job 2: Render HTML to MP4 using HyperFrames
  render:
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install HyperFrames CLI
        run: npm install -g hyperframes

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download composition
        uses: actions/download-artifact@v4
        with:
          name: video-composition
          path: video-pipeline/output/

      - name: Find composition directory
        id: find
        run: |
          cd video-pipeline/output
          COMP_DIR=$(ls -d */ | head -1)
          echo "comp_dir=${COMP_DIR}" >> $GITHUB_OUTPUT

      - name: Render to MP4
        run: |
          cd "video-pipeline/output/${{ steps.find.outputs.comp_dir }}"
          npx hyperframes render --quality high --output video.mp4

      - name: Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: video-pipeline/output/*/video.mp4

  # Job 3: Upload to YouTube (only for scheduled runs or explicit upload)
  upload:
    runs-on: ubuntu-latest
    needs: render
    if: ${{ github.event.inputs.skip_upload != 'true' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd video-pipeline
          npm install

      - name: Download rendered video
        uses: actions/download-artifact@v4
        with:
          name: rendered-video
          path: video-pipeline/output/

      - name: Find video file
        id: find
        run: |
          cd video-pipeline/output
          VIDEO=$(find . -name "video.mp4" | head -1)
          echo "video_path=${VIDEO}" >> $GITHUB_OUTPUT

      - name: Upload to YouTube
        env:
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          # Create config directory
          mkdir -p video-pipeline/config
          
          # Validate secrets exist
          if [ -z "$YOUTUBE_CLIENT_SECRET" ]; then
            echo "❌ YOUTUBE_CLIENT_SECRET is empty or not set"
            exit 1
          fi
          if [ -z "$YOUTUBE_REFRESH_TOKEN" ]; then
            echo "❌ YOUTUBE_REFRESH_TOKEN is empty or not set"
            exit 1
          fi
          
          # Write client_secret.json safely (avoid shell interpretation)
          printf '%s\n' "$YOUTUBE_CLIENT_SECRET" > video-pipeline/config/client_secret.json
          
          # Validate JSON syntax
          if ! python3 -c "import json; json.load(open('video-pipeline/config/client_secret.json'))" 2>/dev/null; then
            echo "❌ client_secret.json is not valid JSON"
            echo "   Length: $(wc -c < video-pipeline/config/client_secret.json) bytes"
            echo "   First 100 chars:"
            head -c 100 video-pipeline/config/client_secret.json
            echo ""
            exit 1
          fi
          echo "✅ client_secret.json validated ($(wc -c < video-pipeline/config/client_secret.json) bytes)"
          
          # Write tokens.json
          printf '{"refresh_token":"%s"}\n' "$YOUTUBE_REFRESH_TOKEN" > video-pipeline/config/tokens.json
          echo "✅ tokens.json created"
          
          # Run upload
          cd video-pipeline
          VIDEO=$(find output -name "video.mp4" | head -1)
          VIDEO_TYPE="${{ github.event.inputs.video_type || 'weekly' }}"
          node scripts/upload-youtube.js --video "$VIDEO" --type "$VIDEO_TYPE" --draft

      - name: Clean up secrets
        if: always()
        run: |
          rm -rf video-pipeline/config/
