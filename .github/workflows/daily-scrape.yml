name: Daily Mortgage Rate Scrape

on:
  schedule:
    # Run twice daily: 6 AM and 6 PM EST
    - cron: '0 11 * * *'   # 11:00 UTC = 6:00 AM EST
    - cron: '0 23 * * *'   # 23:00 UTC = 6:00 PM EST
  workflow_dispatch:  # Manual trigger

# Add permissions for the workflow
permissions:
  contents: write  # Required to push commits
  actions: write   # Required to trigger other workflows

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0  # Full history for committing
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        cd scraping
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install playwright
        playwright install chromium
        
    - name: Run full scraper
      run: |
        cd scraping
        python test_all_lenders_v2.py
      continue-on-error: false
      
    - name: Check for data changes
      id: check_changes
      run: |
        if [ -n "$(git status --porcelain data/)" ]; then
          echo "changes=true" >> $GITHUB_OUTPUT
        else
          echo "changes=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit and push changes
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git commit -m "Daily scrape: $(date +'%Y-%m-%d %H:%M')"
        git push
        
    - name: Trigger deployment
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
          -d '{"ref":"${{ github.ref }}"}'
