name: Post to Social Media

on:
  schedule:
    # Daily at 9:00 AM EST (14:00 UTC) - smart tweet with breaking news priority
    - cron: '0 14 * * *'
    # Weekly on Sundays at 10:00 AM EST (15:00 UTC)
    - cron: '0 15 * * 0'
    # Monthly on 1st at 9:00 AM EST - Rate check poll
    - cron: '0 14 1 * *'
  workflow_dispatch:
    inputs:
      post_type:
        description: 'Type of post'
        required: true
        default: 'smart_tweet'
        type: choice
        options:
          - smart_tweet
          - daily_rates
          - weekly_summary
          - monthly_poll

env:
  NODE_VERSION: '20'

jobs:
  post-to-x:
    name: Post to X (Twitter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run smart tweet
        if: inputs.post_type == 'smart_tweet' || inputs.post_type == 'daily_rates' || github.event.schedule == '0 14 * * *'
        run: npx tsx scripts/smart-tweet.ts
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}

      - name: Run monthly poll
        if: inputs.post_type == 'monthly_poll' || github.event.schedule == '0 14 1 * *'
        run: npx tsx scripts/monthly-poll.ts
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
