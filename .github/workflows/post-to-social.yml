name: Post to Social Media

on:
  schedule:
    # Daily at 9:00 AM EST (14:00 UTC) - after morning scrape
    - cron: '0 14 * * *'
    # Weekly on Sundays at 10:00 AM EST (15:00 UTC)
    - cron: '0 15 * * 0'
    # Monthly on 1st at 9:00 AM EST - Rate check poll
    - cron: '0 14 1 * *'
  workflow_dispatch:
    inputs:
      post_type:
        description: 'Type of post'
        required: true
        default: 'daily_rates'
        type: choice
        options:
          - daily_rates
          - weekly_summary
          - best_rates
          - monthly_poll

env:
  NODE_VERSION: '20'

jobs:
  post-to-x:
    name: Post to X (Twitter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run daily tweet script
        if: github.event_name == 'schedule' && github.event.schedule != '0 14 1 * *' && github.event.inputs.post_type != 'monthly_poll'
        run: npx tsx scripts/daily-tweet.ts
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}

      - name: Run monthly poll
        if: github.event_name == 'schedule' && github.event.schedule == '0 14 1 * *' || github.event.inputs.post_type == 'monthly_poll'
        run: npx tsx scripts/monthly-poll.ts
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}

