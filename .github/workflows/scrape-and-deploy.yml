name: Scrape Rates & Deploy

on:
  schedule:
    - cron: '0 11 * * *'  # 6 AM EST
    - cron: '0 23 * * *'  # 6 PM EST
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Step 1: Checkout
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Scrape rates
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        working-directory: scraping
        run: |
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install chromium

      - name: Run scraper
        working-directory: scraping
        run: python test_all_lenders_v2.py || true

      # Step 3: Commit data changes
      - name: Commit and push data
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-update rates: $(date +'%Y-%m-%d %H:%M UTC')"
            # Force push to avoid race conditions - data updates are authoritative
            git push --force-with-lease origin master
          fi

      # Step 4: Build website
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Create build info
        run: |
          mkdir -p dist
          echo "Build timestamp: $(date +%s)" > dist/build-info.txt
          echo "Rates: $(python3 -c "import json; print(len(json.load(open('data/rates.json'))))" 2>/dev/null || echo "unknown")" >> dist/build-info.txt
          cp data/rates.json dist/
          cp data/metadata.json dist/
          cat dist/build-info.txt

      # Step 5: Deploy to Hostinger via FTP
      - name: Deploy to Hostinger (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./dist/
          server-dir: ./
          dangerous-clean-slate: true
