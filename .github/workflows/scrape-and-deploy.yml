name: Scrape Rates & Deploy

on:
  schedule:
    # Run twice daily: 6 AM and 6 PM EST (11:00 and 23:00 UTC)
    - cron: '0 11 * * *'   # 6:00 AM EST
    - cron: '0 23 * * *'   # 6:00 PM EST
  workflow_dispatch:
    inputs:
      full_scrape:
        description: 'Run full scrape (30+ lenders) vs quick scrape'
        required: false
        default: true
        type: boolean

concurrency:
  group: scrape-and-deploy
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  # Job 1: Scrape mortgage rates
  scrape:
    name: Scrape Mortgage Rates
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check_changes.outputs.changed }}
      rates_count: ${{ steps.scrape.outputs.rates_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: scraping/requirements.txt

      - name: Install Python dependencies
        working-directory: scraping
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('scraping/requirements.txt') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Run scraper
        id: scrape
        working-directory: scraping
        run: |
          python test_all_lenders_v2.py
          # Count rates in output
          RATES_COUNT=$(ls -1 ../data/rates/*.json 2>/dev/null | wc -l || echo "0")
          echo "rates_count=$RATES_COUNT" >> $GITHUB_OUTPUT

      - name: Check for data changes
        id: check_changes
        run: |
          git add data/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in data files"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in data files"
            git diff --staged --stat
          fi

      - name: Upload scraped data
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: scraped-data
          path: |
            data/rates.json
            data/metadata.json
            data/rates/
          retention-days: 7

  # Job 2: Commit changes (only if data changed)
  commit:
    name: Commit Changes
    runs-on: ubuntu-latest
    needs: scrape
    if: needs.scrape.outputs.changed == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download scraped data
        uses: actions/download-artifact@v4
        with:
          name: scraped-data
          path: data/

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git commit -m "🤖 Auto-update rates: $(date +'%Y-%m-%d %H:%M UTC') [${{ needs.scrape.outputs.rates_count }} rates]"
          git push

  # Job 3: Build (only if data changed)
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [scrape, commit]
    if: needs.scrape.outputs.changed == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 1

  # Job 4: Deploy (only if build succeeded)
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://latestmortgagerates.ca
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          timeout: 60000
